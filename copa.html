<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Copa do Mundo 2026 тАФ Placares</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#111111;
  --white:#ffffff;
  --gray-50:#fafafa;
  --gray-100:#f5f5f4;
  --gray-200:#e5e5e5;
  --gray-400:#a3a3a3;
  --gray-500:#737373;
  --green:#16a34a;
  --green-light:#dcfce7;
  --red:#dc2626;
  --red-light:#fee2e2;
  --amber:#d97706;
  --amber-light:#fef3c7;
  --blue:#2563eb;
  --blue-light:#dbeafe;
  --purple:#7c3aed;
  --purple-light:#ede9fe;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#fafafa;color:var(--black);min-height:100vh}

/* NAV */
nav{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--gray-200);position:sticky;top:0;background:rgba(250,250,250,0.95);backdrop-filter:blur(8px);z-index:100}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--black)}
.nav-logo svg{width:26px;height:26px}
.nav-logo span{font-size:15px;font-weight:500;letter-spacing:-0.3px}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-tag{font-size:11px;background:#fff7ed;color:#c2410c;border:0.5px solid #fed7aa;padding:3px 10px;border-radius:100px;font-weight:500}

/* HERO */
.hero{padding:40px 24px 28px;max-width:700px;margin:0 auto;position:relative}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.hero-text h1{font-family:'DM Serif Display',serif;font-size:clamp(26px,5vw,40px);font-weight:400;letter-spacing:-0.5px;line-height:1.15;margin-bottom:6px}
.hero-text p{font-size:14px;color:var(--gray-500);line-height:1.5}
.hero-trophy{font-size:56px;line-height:1;flex-shrink:0}
.live-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--red);margin-top:12px;background:var(--red-light);padding:4px 12px;border-radius:100px;font-weight:500}
.live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}

/* STATS BAR */
.stats-bar{max-width:700px;margin:0 auto;padding:0 24px 24px;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none}
.stats-bar::-webkit-scrollbar{display:none}
.stat-chip{background:var(--white);border:0.5px solid var(--gray-200);border-radius:10px;padding:10px 16px;flex-shrink:0;text-align:center}
.stat-chip-value{font-size:20px;font-weight:600;letter-spacing:-0.5px;line-height:1}
.stat-chip-label{font-size:11px;color:var(--gray-500);margin-top:2px}

/* FILTROS */
.filters{padding:0 24px 20px;max-width:700px;margin:0 auto;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{padding:7px 18px;border-radius:100px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all 0.15s;border:0.5px solid var(--gray-200);background:var(--white);color:var(--gray-500);font-weight:400}
.filter-btn:hover{border-color:var(--gray-400);color:var(--black)}
.filter-btn.active{background:var(--black);color:var(--white);border-color:var(--black)}

/* JOGOS */
.games{padding:0 24px 60px;max-width:700px;margin:0 auto}
.day-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gray-400);margin:28px 0 14px;display:flex;align-items:center;gap:10px}
.day-label::after{content:'';flex:1;height:0.5px;background:var(--gray-200)}
.day-label.today-label{color:var(--blue);font-weight:600}

.game{background:var(--white);border:0.5px solid var(--gray-200);border-radius:14px;padding:18px 20px;margin-bottom:10px;transition:border-color 0.15s,box-shadow 0.15s}
.game:hover{border-color:var(--gray-400);box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.game.live{border-color:#fca5a5;background:#fffafa}
.game.finished{opacity:0.75}

.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.game-group{font-size:11px;color:var(--gray-400);letter-spacing:0.5px}
.status-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px}
.badge-live{background:var(--red-light);color:var(--red)}
.badge-halftime{background:var(--amber-light);color:var(--amber)}
.badge-finished{background:var(--gray-100);color:var(--gray-500)}
.badge-scheduled{background:var(--blue-light);color:var(--blue)}

.game-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.team{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center}
.team-flag{font-size:32px;line-height:1}
.team-name{font-size:13px;font-weight:500;line-height:1.3;color:var(--black)}

.score-center{text-align:center}
.score{font-size:28px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1}
.score-sep{color:var(--gray-300);margin:0 3px;font-weight:300}
.score-time{font-size:12px;color:var(--gray-400);margin-top:4px}
.score-scheduled{font-size:13px;color:var(--gray-500);font-weight:500}

.game-footer{margin-top:10px;padding-top:10px;border-top:0.5px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center}
.game-venue{font-size:11px;color:var(--gray-400)}
.game-stage{font-size:11px;color:var(--gray-400)}

/* BRASIL HIGHLIGHT */
.game.brasil{border-color:#86efac;background:linear-gradient(135deg,#f0fdf4,#ffffff)}
.game.brasil .game-header::before{content:'ЁЯЗзЁЯЗ╖';margin-right:6px;font-size:12px}

/* LOADING / ERROR */
.loading{padding:60px 0;text-align:center;color:var(--gray-400)}
.spinner{width:24px;height:24px;border:2px solid var(--gray-200);border-top-color:var(--black);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{padding:20px;background:var(--amber-light);border:0.5px solid #fde68a;border-radius:12px;font-size:13px;color:#92400e;text-align:center;line-height:1.6}
.error a{color:#92400e;font-weight:500}

/* LAST UPDATED */
.last-updated{text-align:center;font-size:11px;color:var(--gray-400);padding:8px 0 0}

/* FOOTER */
footer{border-top:0.5px solid var(--gray-200);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:var(--white)}
.footer-fluxio{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--gray-500);font-size:12px;transition:color 0.2s}
.footer-fluxio:hover{color:var(--black)}
.footer-fluxio svg{width:18px;height:18px}
.footer-note{font-size:11px;color:var(--gray-400)}

@media(max-width:500px){
  .hero{padding:28px 16px 20px}
  .stats-bar{padding:0 16px 20px}
  .filters{padding:0 16px 16px}
  .games{padding:0 16px 48px}
  .hero-trophy{font-size:44px}
  .team-flag{font-size:26px}
  .score{font-size:24px}
  .game{padding:14px 16px}
  footer{padding:16px}
}
</style>
</head>
<body>

<nav>
  <a href="https://fluxioapp.com.br" class="nav-logo">
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="72" height="72" rx="18" fill="#111111"/>
      <path d="M16 52 C16 52 24 36 36 36 C48 36 48 20 56 20" stroke="white" stroke-width="5" stroke-linecap="round"/>
      <circle cx="56" cy="20" r="5" fill="white"/>
      <circle cx="16" cy="52" r="5" fill="white"/>
    </svg>
    <span>fluxio</span>
  </a>
  <div class="nav-right">
    <span class="nav-tag">тЪ╜ Copa 2026</span>
  </div>
</nav>

<div class="hero">
  <div class="hero-top">
    <div class="hero-text">
      <h1>Copa do Mundo<br/>2026</h1>
      <p>Placares e resultados em tempo real</p>
      <div class="live-pill" id="livePill" style="display:none">
        <span class="live-dot"></span> Jogos ao vivo agora
      </div>
    </div>
    <div class="hero-trophy">ЁЯПЖ</div>
  </div>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
  <div class="stat-chip">
    <div class="stat-chip-value" id="statTotal">тАФ</div>
    <div class="stat-chip-label">Jogos</div>
  </div>
  <div class="stat-chip">
    <div class="stat-chip-value" id="statFinished">тАФ</div>
    <div class="stat-chip-label">Encerrados</div>
  </div>
  <div class="stat-chip">
    <div class="stat-chip-value" id="statUpcoming">тАФ</div>
    <div class="stat-chip-label">Pr├│ximos</div>
  </div>
  <div class="stat-chip">
    <div class="stat-chip-value" id="statLive" style="color:var(--red)">тАФ</div>
    <div class="stat-chip-label">Ao vivo</div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterGames('all',this)">Todos</button>
  <button class="filter-btn" onclick="filterGames('live',this)">ЁЯФ┤ Ao vivo</button>
  <button class="filter-btn" onclick="filterGames('today',this)">Hoje</button>
  <button class="filter-btn" onclick="filterGames('upcoming',this)">Pr├│ximos</button>
  <button class="filter-btn" onclick="filterGames('finished',this)">Encerrados</button>
  <button class="filter-btn" onclick="filterGames('brasil',this)">ЁЯЗзЁЯЗ╖ Brasil</button>
</div>

<div class="games" id="gamesContainer">
  <div class="loading">
    <div class="spinner"></div>
    <p>Carregando placares...</p>
  </div>
</div>
<div class="last-updated" id="lastUpdated"></div>

<footer>
  <a href="https://fluxioapp.com.br" class="footer-fluxio">
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="72" height="72" rx="18" fill="#111111"/>
      <path d="M16 52 C16 52 24 36 36 36 C48 36 48 20 56 20" stroke="white" stroke-width="5" stroke-linecap="round"/>
      <circle cx="56" cy="20" r="5" fill="white"/>
      <circle cx="16" cy="52" r="5" fill="white"/>
    </svg>
    Conhe├зa o Fluxio тАФ gest├гo para pequenos neg├│cios
  </a>
  <span class="footer-note">Dados: football-data.org</span>
</footer>

<script>
const WC_URL = 'https://fluxioapp-production.up.railway.app/api/v1/public/copa/matches';

const FLAGS = {
  'BRA':'ЁЯЗзЁЯЗ╖','ARG':'ЁЯЗжЁЯЗ╖','FRA':'ЁЯЗлЁЯЗ╖','ESP':'ЁЯЗкЁЯЗ╕','ENG':'ЁЯП┤ґаБзґаБвґаБеґаБоґаБзґаБ┐','GER':'ЁЯЗйЁЯЗк',
  'POR':'ЁЯЗ╡ЁЯЗ╣','NED':'ЁЯЗ│ЁЯЗ▒','BEL':'ЁЯЗзЁЯЗк','ITA':'ЁЯЗоЁЯЗ╣','URU':'ЁЯЗ║ЁЯЗ╛','MEX':'ЁЯЗ▓ЁЯЗ╜',
  'USA':'ЁЯЗ║ЁЯЗ╕','CAN':'ЁЯЗиЁЯЗж','JPN':'ЁЯЗпЁЯЗ╡','KOR':'ЁЯЗ░ЁЯЗ╖','MAR':'ЁЯЗ▓ЁЯЗж','SEN':'ЁЯЗ╕ЁЯЗ│',
  'GHA':'ЁЯЗмЁЯЗн','EGY':'ЁЯЗкЁЯЗм','TUN':'ЁЯЗ╣ЁЯЗ│','CIV':'ЁЯЗиЁЯЗо','AUS':'ЁЯЗжЁЯЗ║','NZL':'ЁЯЗ│ЁЯЗ┐',
  'CRO':'ЁЯЗнЁЯЗ╖','SRB':'ЁЯЗ╖ЁЯЗ╕','POL':'ЁЯЗ╡ЁЯЗ▒','SUI':'ЁЯЗиЁЯЗн','DEN':'ЁЯЗйЁЯЗ░','SCO':'ЁЯП┤ґаБзґаБвґаБ│ґаБгґаБ┤ґаБ┐',
  'IRN':'ЁЯЗоЁЯЗ╖','SAU':'ЁЯЗ╕ЁЯЗж','QAT':'ЁЯЗ╢ЁЯЗж','ECU':'ЁЯЗкЁЯЗи','COL':'ЁЯЗиЁЯЗ┤','PAR':'ЁЯЗ╡ЁЯЗ╛',
  'HAI':'ЁЯЗнЁЯЗ╣','UZB':'ЁЯЗ║ЁЯЗ┐','CPV':'ЁЯЗиЁЯЗ╗','ALG':'ЁЯЗйЁЯЗ┐','AUT':'ЁЯЗжЁЯЗ╣','JOR':'ЁЯЗпЁЯЗ┤',
  'NOR':'ЁЯЗ│ЁЯЗ┤','UKR':'ЁЯЗ║ЁЯЗж','SWE':'ЁЯЗ╕ЁЯЗк','ZAF':'ЁЯЗ┐ЁЯЗж','CUR':'ЁЯЗиЁЯЗ╝','GEO':'ЁЯЗмЁЯЗк',
  'PAN':'ЁЯЗ╡ЁЯЗж','default':'ЁЯП│я╕П'
};

let allMatches = [];
let currentFilter = 'all';

function getFlag(tla){ return FLAGS[tla] || FLAGS['default']; }

function formatDateTime(dateStr){
  return new Date(dateStr).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function formatHour(dateStr){
  return new Date(dateStr).toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'});
}

function formatDay(dateStr){
  const d = new Date(dateStr);
  const today = new Date();
  const tomorrow = new Date(); tomorrow.setDate(today.getDate()+1);
  const yesterday = new Date(); yesterday.setDate(today.getDate()-1);
  if(d.toDateString()===today.toDateString()) return '__TODAY__';
  if(d.toDateString()===tomorrow.toDateString()) return 'Amanh├г';
  if(d.toDateString()===yesterday.toDateString()) return 'Ontem';
  return d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
}

function isBrasil(m){
  return m.homeTeam?.tla==='BRA' || m.awayTeam?.tla==='BRA';
}

function renderMatches(matches){
  const container = document.getElementById('gamesContainer');
  if(!matches.length){
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--gray-400);font-size:14px">Nenhum jogo neste filtro.</div>';
    return;
  }

  const byDay = {};
  matches.forEach(m => {
    const day = formatDay(m.utcDate);
    if(!byDay[day]) byDay[day] = [];
    byDay[day].push(m);
  });

  let html = '';
  for(const [day, games] of Object.entries(byDay)){
    const isToday = day === '__TODAY__';
    const label = isToday ? 'Hoje' : day;
    html += `<div class="day-label ${isToday?'today-label':''}">${label}</div>`;

    games.forEach(m => {
      const home = m.homeTeam;
      const away = m.awayTeam;
      const score = m.score;
      const isLive = m.status==='IN_PLAY';
      const isPaused = m.status==='PAUSED';
      const isFinished = m.status==='FINISHED';
      const isScheduled = ['TIMED','SCHEDULED'].includes(m.status);
      const brasil = isBrasil(m);

      const hs = score?.fullTime?.home ?? ((isLive||isPaused) ? score?.halfTime?.home : null);
      const as_ = score?.fullTime?.away ?? ((isLive||isPaused) ? score?.halfTime?.away : null);
      const showScore = hs !== null && hs !== undefined;

      let badgeHtml = '';
      if(isLive) badgeHtml = `<span class="status-badge badge-live">тЧП ${m.minute||''}' ao vivo</span>`;
      else if(isPaused) badgeHtml = `<span class="status-badge badge-halftime">Intervalo</span>`;
      else if(isFinished) badgeHtml = `<span class="status-badge badge-finished">Encerrado</span>`;
      else if(isScheduled) badgeHtml = `<span class="status-badge badge-scheduled">${formatHour(m.utcDate)}</span>`;

      let scoreHtml = '';
      if(showScore){
        scoreHtml = `<div class="score">${hs}<span class="score-sep">┬╖</span>${as_}</div>`;
        if(isLive) scoreHtml += `<div class="score-time" style="color:var(--red);font-size:11px">${m.minute||0}'</div>`;
      } else {
        scoreHtml = `<div class="score-scheduled">${formatHour(m.utcDate)}</div>`;
      }

      html += `
      <div class="game ${isLive||isPaused?'live':''} ${isFinished?'finished':''} ${brasil?'brasil':''}">
        <div class="game-header">
          <span class="game-group">${m.group||m.stage||''}</span>
          ${badgeHtml}
        </div>
        <div class="game-body">
          <div class="team">
            <div class="team-flag">${getFlag(home.tla)}</div>
            <div class="team-name">${home.shortName||home.name}</div>
          </div>
          <div class="score-center">${scoreHtml}</div>
          <div class="team">
            <div class="team-flag">${getFlag(away.tla)}</div>
            <div class="team-name">${away.shortName||away.name}</div>
          </div>
        </div>
        ${m.venue ? `<div class="game-footer"><span class="game-venue">ЁЯУН ${m.venue}</span><span class="game-stage"></span></div>` : ''}
      </div>`;
    });
  }
  container.innerHTML = html;
}

function filterGames(filter, btn){
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const today = new Date();
  let filtered = allMatches;

  if(filter==='live') filtered = allMatches.filter(m => ['IN_PLAY','PAUSED'].includes(m.status));
  else if(filter==='today') filtered = allMatches.filter(m => new Date(m.utcDate).toDateString()===today.toDateString());
  else if(filter==='upcoming') filtered = allMatches.filter(m => ['TIMED','SCHEDULED'].includes(m.status));
  else if(filter==='finished') filtered = allMatches.filter(m => m.status==='FINISHED');
  else if(filter==='brasil') filtered = allMatches.filter(m => isBrasil(m));

  renderMatches(filtered);
}

function updateStats(matches){
  const bar = document.getElementById('statsBar');
  bar.style.display = 'flex';
  document.getElementById('statTotal').textContent = matches.length;
  document.getElementById('statFinished').textContent = matches.filter(m=>m.status==='FINISHED').length;
  document.getElementById('statUpcoming').textContent = matches.filter(m=>['TIMED','SCHEDULED'].includes(m.status)).length;
  const live = matches.filter(m=>['IN_PLAY','PAUSED'].includes(m.status)).length;
  document.getElementById('statLive').textContent = live || 'тАФ';
}

async function loadMatches(){
  const container = document.getElementById('gamesContainer');
  try {
    const res = await fetch(WC_URL);
    if(!res.ok) throw new Error(res.status);
    const data = await res.json();
    allMatches = (data.matches||[]).sort((a,b) => new Date(a.utcDate)-new Date(b.utcDate));

    const hasLive = allMatches.some(m => ['IN_PLAY','PAUSED'].includes(m.status));
    document.getElementById('livePill').style.display = hasLive ? 'inline-flex' : 'none';

    updateStats(allMatches);
    filterGames(currentFilter, document.querySelector('.filter-btn.active'));

    document.getElementById('lastUpdated').textContent =
      `Atualizado ├аs ${new Date().toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo',hour:'2-digit',minute:'2-digit'})}`;

  } catch(e){
    container.innerHTML = `<div class="error">
      N├гo foi poss├нvel carregar os jogos. Verifique sua conex├гo ou tente novamente em instantes.
    </div>`;
  }
}

loadMatches();
setInterval(loadMatches, 60000);
</script>
</body>
</html>
